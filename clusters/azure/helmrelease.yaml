apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portfolio
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: charts/portfolio
      sourceRef:
        kind: GitRepository
        name: portfolio
        namespace: flux-system
      valuesFiles:
        - charts/portfolio/values.yaml
        - charts/portfolio/values-azure.yaml
  install:
    createNamespace: true